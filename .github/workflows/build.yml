name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称'
        required: true
        type: string
      signature_type:
        description: '签名类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      signature_type: ${{ steps.version.outputs.signature_type }}
      create_release: ${{ steps.version.outputs.create_release }}
      trigger_type: ${{ steps.version.outputs.trigger_type }}
      trigger_actor: ${{ steps.version.outputs.trigger_actor }}
      build_time: ${{ steps.version.outputs.build_time }}
      run_id: ${{ steps.version.outputs.run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set version variables
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER_TYPE="workflow_dispatch"
            TRIGGER_ACTOR="${{ github.actor }}"
            RAW_VERSION_NAME="${{ github.event.inputs.version_name }}"
            SIGNATURE_TYPE="${{ github.event.inputs.signature_type }}"
            CREATE_RELEASE="${{ github.event.inputs.create_release }}"
          else
            TRIGGER_TYPE="push"
            TRIGGER_ACTOR="${{ github.actor }}"
            RAW_VERSION_NAME="dev-${GITHUB_SHA::7}"
            SIGNATURE_TYPE="debug"
            CREATE_RELEASE="false"
          fi

          SAFE_VERSION_NAME=$(echo "$RAW_VERSION_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          VERSION_CODE="${{ github.run_number }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          RUN_ID="${{ github.run_id }}"

          echo "version_name=$SAFE_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "signature_type=$SIGNATURE_TYPE" >> "$GITHUB_OUTPUT"
          echo "create_release=$CREATE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "trigger_type=$TRIGGER_TYPE" >> "$GITHUB_OUTPUT"
          echo "trigger_actor=$TRIGGER_ACTOR" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          echo "VERSION_NAME=$SAFE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "SIGNATURE_TYPE=$SIGNATURE_TYPE" >> "$GITHUB_ENV"
          echo "CREATE_RELEASE=$CREATE_RELEASE" >> "$GITHUB_ENV"

      - name: Setup keystore for signing
        id: keystore
        run: |
          if [ "${{ steps.version.outputs.signature_type }}" = "release" ]; then
            if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
              echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
              echo "✅ Release keystore decoded successfully to app/release.keystore"
              echo "storeFile=release.keystore" >> "$GITHUB_OUTPUT"
              echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
              echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
              echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ ANDROID_KEYSTORE_BASE64 not found, falling back to debug signing"
              echo "SIGNATURE_TYPE=debug" >> "$GITHUB_ENV"
            fi
          fi

          if [ "${{ steps.version.outputs.signature_type }}" = "debug" ] || [ ! -f "app/release.keystore" ]; then
            keytool -genkey -v \
              -keystore app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug-CI, O=Android, C=CN" \
              -storepass android \
              -keypass android
            echo "✅ Debug keystore created in app/debug.keystore"
          fi

      - name: Build APK (multi-ABI)
        id: build_apk
        run: |
          chmod +x gradlew
          if [ "${{ steps.version.outputs.signature_type }}" = "release" ]; then
            echo "🔨 Building Release APK with signing..."
            export KEYSTORE_PATH="release.keystore"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            export SIGN_TYPE="release"
            ./gradlew assembleRelease
          else
            echo "🔨 Building Debug APK..."
            export DEBUG_KEYSTORE_PATH="debug.keystore"
            ./gradlew assembleDebug
          fi
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}

      - name: Verify APK signature
        if: success()
        run: |
          echo "🔍 Verifying APK signatures..."
          find app/build/outputs/apk -name "*.apk" -type f | while read apk_file; do
            echo "----------------------------------------"
            echo "Checking: $(basename "$apk_file")"
            if jarsigner -verify -verbose "$apk_file" 2>&1 | grep -q "jar verified"; then
              echo "✅ Signed successfully"
            else
              echo "❌ Not signed or signature invalid"
            fi
          done

      - name: Organize APKs by ABI
        if: success()
        run: |
          SIGNATURE_TYPE="${{ steps.version.outputs.signature_type }}"
          mkdir -p "apks/${SIGNATURE_TYPE}/arm64-v8a"
          mkdir -p "apks/${SIGNATURE_TYPE}/armeabi-v7a"
          mkdir -p "apks/${SIGNATURE_TYPE}/universal"
          mkdir -p "apks/${SIGNATURE_TYPE}/x86"
          mkdir -p "apks/${SIGNATURE_TYPE}/x86_64"

          find app/build/outputs/apk -name "*.apk" -type f | while read apk_file; do
            filename=$(basename "$apk_file")
            if echo "$filename" | grep -q "arm64-v8a"; then
              cp "$apk_file" "apks/${SIGNATURE_TYPE}/arm64-v8a/"
              echo "Organized: arm64-v8a/${filename}"
            elif echo "$filename" | grep -q "armeabi-v7a"; then
              cp "$apk_file" "apks/${SIGNATURE_TYPE}/armeabi-v7a/"
              echo "Organized: armeabi-v7a/${filename}"
            elif echo "$filename" | grep -q "universal"; then
              cp "$apk_file" "apks/${SIGNATURE_TYPE}/universal/"
              echo "Organized: universal/${filename}"
            elif echo "$filename" | grep -q "x86_64"; then
              cp "$apk_file" "apks/${SIGNATURE_TYPE}/x86_64/"
              echo "Organized: x86_64/${filename}"
            elif echo "$filename" | grep -q "x86" && ! echo "$filename" | grep -q "x86_64"; then
              cp "$apk_file" "apks/${SIGNATURE_TYPE}/x86/"
              echo "Organized: x86/${filename}"
            fi
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: LinkBot-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.signature_type }}
          path: apks/**/*.apk
          retention-days: 30

  generate-changelog:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi

          UPDATES="${COMMITS:-暂无更新记录}"

          VERSION_NAME="${{ needs.build.outputs.version_name }}"
          SIGNATURE_TYPE="${{ needs.build.outputs.signature_type }}"
          TRIGGER_ACTOR="${{ needs.build.outputs.trigger_actor }}"
          BUILD_TIME="${{ needs.build.outputs.build_time }}"
          RUN_ID="${{ needs.build.outputs.run_id }}"

          cat > release_body.md <<RELEASE_EOF
          ## LinkBot v${VERSION_NAME}

          ---

          ### 更新内容

          ${UPDATES}

          ---

          ### 构建信息

          | 项目 | 值 |
          |------|-----|
          | 状态 | Success |
          | 签名类型 | ${SIGNATURE_TYPE} |
          | 触发方式 | by @${TRIGGER_ACTOR} |
          | 构建时间 | ${BUILD_TIME} |
          | 支持架构 | arm64-v8a, armeabi-v7a, x86, x86_64, universal |

          ---

          Generated by GitHub Actions
          RELEASE_EOF

          {
            echo "changelog<<EOF"
            cat release_body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: LinkBot-${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}
          path: apk/

      - name: Rename APKs for release
        run: |
          cd apk/
          SIGNATURE_TYPE="${{ needs.build.outputs.signature_type }}"
          VERSION_NAME="${{ needs.build.outputs.version_name }}"

          mkdir -p "${SIGNATURE_TYPE}/arm64-v8a"
          mkdir -p "${SIGNATURE_TYPE}/armeabi-v7a"
          mkdir -p "${SIGNATURE_TYPE}/universal"
          mkdir -p "${SIGNATURE_TYPE}/x86"
          mkdir -p "${SIGNATURE_TYPE}/x86_64"

          find . -name "*.apk" -type f | while read file; do
            filename=$(basename "$file")
            if echo "$filename" | grep -q "arm64-v8a"; then
              mv "$file" "${SIGNATURE_TYPE}/arm64-v8a/LinkBot-v${VERSION_NAME}-arm64-v8a-${SIGNATURE_TYPE}.apk"
              echo "Renamed: arm64-v8a"
            elif echo "$filename" | grep -q "armeabi-v7a"; then
              mv "$file" "${SIGNATURE_TYPE}/armeabi-v7a/LinkBot-v${VERSION_NAME}-armeabi-v7a-${SIGNATURE_TYPE}.apk"
              echo "Renamed: armeabi-v7a"
            elif echo "$filename" | grep -q "universal"; then
              mv "$file" "${SIGNATURE_TYPE}/universal/LinkBot-v${VERSION_NAME}-universal-${SIGNATURE_TYPE}.apk"
              echo "Renamed: universal"
            elif echo "$filename" | grep -q "x86_64"; then
              mv "$file" "${SIGNATURE_TYPE}/x86_64/LinkBot-v${VERSION_NAME}-x86_64-${SIGNATURE_TYPE}.apk"
              echo "Renamed: x86_64"
            elif echo "$filename" | grep -q "x86" && ! echo "$filename" | grep -q "x86_64"; then
              mv "$file" "${SIGNATURE_TYPE}/x86/LinkBot-v${VERSION_NAME}-x86-${SIGNATURE_TYPE}.apk"
              echo "Renamed: x86"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          draft: false
          files: apk/**/*.apk
          tag: v${{ needs.build.outputs.version_name }}
          name: LinkBot v${{ needs.build.outputs.version_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}